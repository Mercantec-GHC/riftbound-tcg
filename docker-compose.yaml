version: "3.9"

services:

  dozzle-init:
    image: docker:27-cli
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - ./dozzle:/data
      - ./dozzle/init-users.sh:/scripts/generate-users.sh:ro
    environment:
      - DOZZLE_ADMIN_USERNAME=${DOZZLE_ADMIN_USERNAME:-admin}
      - DOZZLE_ADMIN_PASSWORD=${DOZZLE_ADMIN_PASSWORD}
      - DOZZLE_ADMIN_EMAIL=${DOZZLE_ADMIN_EMAIL:-me@email.net}
      - DOZZLE_ADMIN_NAME=${DOZZLE_ADMIN_NAME:-Admin}
      - DOZZLE_ADMIN_FILTER=${DOZZLE_ADMIN_FILTER:-}
      - DOZZLE_ADMIN_ROLES=${DOZZLE_ADMIN_ROLES:-}
    entrypoint: ["sh", "/scripts/generate-users.sh"]

  dozzle:
    image: amir20/dozzle:latest
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - ./dozzle:/data
    ports:
      - 8086:8080
    depends_on:
      dozzle-init:
        condition: service_completed_successfully
    environment:
      # Uncomment to enable container actions (stop, start, restart). See https://dozzle.dev/guide/actions
      - DOZZLE_ENABLE_ACTIONS=true
      #
      # Uncomment to allow access to container shells. See https://dozzle.dev/guide/shell
      - DOZZLE_ENABLE_SHELL=true
      #
      # Uncomment to enable authentication. See https://dozzle.dev/guide/authentication
      - DOZZLE_AUTH_PROVIDER=simple
      #
      # Label this Dozzle instance (shown in the header and multi-host menu). See https://dozzle.dev/guide/hostname
      # - DOZZLE_HOSTNAME=my-server
      #
      # Connect to one or more remote agents to monitor other Docker hosts. See https://dozzle.dev/guide/agent
      # - DOZZLE_REMOTE_AGENT=192.168.1.10:7007,192.168.1.11:7007
      #
      # Only show containers matching a filter. See https://dozzle.dev/guide/filters
      # - DOZZLE_FILTER=label=com.example.app

  api:
    build:
      context: .
      dockerfile: ./riftbound-tcg.Server/Dockerfile
    ports:
      - "8084:8080"
    environment:
      - DATABASE_URL=postgres://app:secret@db:5432/app
    depends_on:
      db:
        condition: service_healthy
    networks:
      - backend

  db:
    image: postgres:16-alpine
    environment:
      - POSTGRES_DB=${POSTGRES__DB}
      - POSTGRES_USER=${POSTGRES__USER}
      - POSTGRES_PASSWORD=${POSTGRES__PASSWORD}
    volumes:
      - db-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U \"$${POSTGRES_USER}\" -d \"$${POSTGRES_DB}\""]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - backend

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "8080:8080"
    networks:
      - backend
  
  pgadmin:
    image: dpage/pgadmin4:latest
    environment:
      - PGADMIN_DEFAULT_EMAIL=${PGADMIN_DEFAULT_EMAIL}
      - PGADMIN_DEFAULT_PASSWORD=${PGADMIN_DEFAULT_PASSWORD}
    ports:
      - "8082:80"
    volumes:
      - pgadmin-data:/var/lib/pgadmin
    depends_on:
      db:
        condition: service_healthy
    networks:
      - backend

networks:
  backend: {}

volumes:
  db-data: {}
  dozzle: {}
  pgadmin-data: {}