name: Deploy frontend to Dokploy

on:
  push:
    branches:
      - main
    paths:
      - frontend/**

permissions: {}

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger Dokploy deployment
        env: 
          domain: ${{secrets.dokploy_domain}}
          appId:  ${{secrets.dokploy_frontend_appid}}
          apiKey: ${{secrets.dokploy_api_key}}
        run: |
          curl -X 'POST' "https://${domain}/api/application.deploy" -H "accept: application/json" -H "Content-Type: application/json"  -H "x-api-key: ${apiKey}"  -d "{ \"applicationId\": \"${appId}\"}"
