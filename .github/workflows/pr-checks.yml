name: PR Checks

on:
  pull_request:
    branches:
      - main

permissions:
  contents: read

jobs:
  test-backend:
    name: Backend tests (.NET)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Restore dependencies
        run: dotnet restore riftbound-tcg.Tests/riftbound-tcg.Tests.csproj

      - name: Build
        run: dotnet build riftbound-tcg.Tests/riftbound-tcg.Tests.csproj --no-restore --configuration Release

      - name: Run tests
        run: dotnet test riftbound-tcg.Tests/riftbound-tcg.Tests.csproj --no-build --configuration Release --logger "trx;LogFileName=results.trx"

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: riftbound-tcg.Tests/TestResults/results.trx

  frontend-checks:
    name: Frontend checks (lint/build)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build
      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: riftbound-tcg.Tests/TestResults/results.trx
